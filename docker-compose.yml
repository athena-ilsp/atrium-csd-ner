services:
  api:
    restart: always
    env_file: ".env"  
    build: 
      context: .
      dockerfile: deployment/api.Dockerfile
    image: athena-ilsp/atrium-csd-ner-api:latest
    ports:
      - "${HOST_API_PORT:-8000}:8000"
    environment:
      - MODEL_PATH=/app/data/train/final
      - API_ROOT_PATH=${API_ROOT_PATH}
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface
      - ./data:/app/data
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
  
  ui:
    restart: always
    env_file: ".env"
    build:
      context: .
      dockerfile: deployment/ui.Dockerfile
    image: athena-ilsp/atrium-csd-ner-ui:latest
    ports:
      - "${HOST_UI_PORT:-8501}:8501"
    environment:
      - API_BASE_URL=http://api:8000
      - API_ROOT_PATH=${API_ROOT_PATH}
    volumes:
      - ./src:/ui/src
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  hf_cache:
  flair_cache:
